<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | MedFair</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-E5Y3500327"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-E5Y3500327');
</script>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Navigation -->
  <header class="bg-[#0C1F4A] text-white sticky top-0 z-40 shadow-md">
    <nav class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
      <span class="text-lg font-semibold tracking-tight">MedFair Blog</span>
      <a href="/" class="bg-white text-[#0C1F4A] text-sm font-semibold px-4 py-2 rounded-lg hover:bg-blue-50 transition-colors">
        Back to Tool
      </a>
    </nav>
  </header>

  <!-- Blog Content Area -->
  <main class="max-w-3xl mx-auto px-4 py-12">
    <!-- এই prose ক্লাসটি আপনার নরমাল লেখাকে অটোমেটিক ডিজাইন করে দেবে -->
    <article class="prose prose-slate prose-lg max-w-none bg-white p-8 sm:p-12 rounded-xl shadow-sm border border-slate-200 mx-auto">
      
      {{ content }}
      
    </article>
  </main>

</body>
</html>
